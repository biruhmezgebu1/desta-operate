<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:#F5F4F0;color:#2D2D2D;font-family:system-ui,-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.btn{padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all .2s}.btn:hover{transform:translateY(-1px)}
.input{padding:10px 14px;border:1px solid #E0E0E0;border-radius:6px;font-size:13px;width:100%;transition:border-color .2s;background:#fff}.input:focus{outline:none;border-color:#8B7355;box-shadow:0 0 0 3px rgba(139,115,85,.08)}
select.input{cursor:pointer}.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:700;letter-spacing:.3px}
.section{background:#fff;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid rgba(0,0,0,.06)}
.ni{padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#888;transition:all .15s}.ni:hover{background:rgba(139,115,85,.06);color:#2D2D2D}.ni.on{background:#8B7355;color:#F8F6F1}
table{width:100%;border-collapse:collapse}th{text-align:left;padding:8px 10px;font-size:11px;color:#888;letter-spacing:.5px;text-transform:uppercase;border-bottom:2px solid #f0f0f0;background:#FAFAFA}td{padding:8px 10px;border-bottom:1px solid #f5f5f5;font-size:13px}tr:hover td{background:#FDFBF7}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:16px;max-width:760px;width:95%;max-height:90vh;overflow-y:auto;padding:28px;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.tab{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;border:none;background:transparent;color:#777;cursor:pointer;transition:all .2s}.tab.on{background:#2D2D2D;color:#fff}
.sidebar{width:200px;background:#fff;border-right:1px solid rgba(0,0,0,.06);padding:16px 10px;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 52px)}
.hamburger{display:none;background:none;border:none;font-size:22px;cursor:pointer;padding:4px 8px;color:#2D2D2D}
.mob-overlay{display:none}
.user-row{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid #f0f0f0;transition:background .15s}.user-row:hover{background:#FDFBF7}
.payer-card{background:#fff;border:1px solid rgba(0,0,0,.06);border-radius:10px;padding:14px;margin-bottom:8px;transition:all .2s}.payer-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.progress-bar{height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}.progress-fill{height:100%;border-radius:4px;transition:width .3s}
.alert-card{padding:12px 14px;border-radius:8px;margin-bottom:6px;display:flex;align-items:center;gap:10px;font-size:12px}
@media print{.sidebar,.no-print{display:none!important}div[style*="position: sticky"]{position:static!important;box-shadow:none!important}}
@media(max-width:768px){.sidebar{position:fixed;left:-260px;top:52px;bottom:0;width:240px;z-index:200;transition:left .25s ease;box-shadow:none;max-height:none}.sidebar.open{left:0;box-shadow:4px 0 20px rgba(0,0,0,.15)}.hamburger{display:block}.mob-overlay{display:block;position:fixed;top:52px;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:199}}
</style>
<script type="text/babel">
var useState=React.useState,useEffect=React.useEffect;

/* ========== CONFIG ========== */
var U="https://script.google.com/macros/s/AKfycbwa725xDxl3auLiZQ-AYxM1--rUOqaYCHM8RXr4mY_-5bX6qUloUUw3uufLBSD6YCBqQQ/exec";
var ADMINS=["biruhmezgebu1@gmail.com"];
var C={ch:"#2D2D2D",br:"#8B7355",iv:"#F8F6F1",bl:"#1E4A8A",gn:"#43A047",rd:"#E53935",or:"#FB8C00",pu:"#7B1FA2",tl:"#00897B",gy:"#888",wh:"#fff",lbl:"#EBF0F8"};
var CLIENTS=["Sterling Institute","Contemporary Care","DOCs Medical Group","Ritu Suri & Associates","Direct Client"];
var PAYERS=["Aetna","Anthem BCBS","Cigna","UnitedHealthcare","Medicare","Medicaid","Optum","Humana","Tricare","Self-Pay"];
var CRED_TYPES=["State License","DEA Registration","Malpractice Insurance","Board Certification","NPI Registration","CAQH Profile","Medicaid Enrollment","Medicare Enrollment","Specialty Certification","BLS/ACLS","CE Credits","Supervision Agreement"];
var PAYER_STATUSES=["Not Started","Application Sent","Under Review","Pending Info","Approved","Denied","Expired"];
var PSC={"Not Started":"#E0E0E0","Application Sent":"#42A5F5","Under Review":"#AB47BC","Pending Info":"#FB8C00","Approved":"#43A047","Denied":"#E53935","Expired":"#888"};
var PROVIDER_STATUSES=["Onboarding","Active","On Leave","Inactive","Terminated"];

function post(d){return fetch(U,{method:"POST",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).catch(function(){})}

/* ========== COMPONENTS ========== */
function Av(p){if(p.src)return React.createElement("img",{src:p.src,style:{width:p.size||32,height:p.size||32,borderRadius:"50%",objectFit:"cover"}});
var n=(p.name||"?")[0];return <div style={{width:p.size||32,height:p.size||32,borderRadius:"50%",background:"linear-gradient(135deg,#8B7355,#C4A97D)",display:"flex",alignItems:"center",justifyContent:"center",color:C.iv,fontWeight:700,fontSize:(p.size||32)*0.4}}>{n}</div>}

/* ========== MAIN APP ========== */
function App(){
var saved=null;try{var ss=localStorage.getItem("desta_op_session");if(ss)saved=JSON.parse(ss)}catch(e){}
var _ph=useState(saved?"app":"auth"),ph=_ph[0],sPh=_ph[1];
var _u=useState(saved?saved.user:""),user=_u[0],sU=_u[1];
var _ue=useState(saved?saved.email:""),ue=_ue[0],sUE=_ue[1];
var _pw=useState(""),pw=_pw[0],sPW=_pw[1];
var _role=useState(saved?saved.role:null),role=_role[0],sRole=_role[1];
var _ae=useState(""),ae=_ae[0],sAE=_ae[1];
var _vw=useState("dash"),vw=_vw[0],sV=_vw[1];
var _mob=useState(false),mobOpen=_mob[0],sMob=_mob[1];
var _ld=useState(false),ld=_ld[0],sL=_ld[1];
var _sel=useState(null),sel=_sel[0],sSel=_sel[1];
var _addP=useState(false),showAddP=_addP[0],sAddP=_addP[1];
var _fc=useState("all"),fc=_fc[0],sFC=_fc[1];

/* Data */
var _providers=useState([]),providers=_providers[0],sProviders=_providers[1];
var _credentials=useState([]),credentials=_credentials[0],sCreds=_credentials[1];
var _enrollments=useState([]),enrollments=_enrollments[0],sEnroll=_enrollments[1];
var _activity=useState([]),activity=_activity[0],sActivity=_activity[1];
var _cfg=useState({invites:[]}),cfg=_cfg[0],sCfg=_cfg[1];

/* Add Provider form state */
var _af=useState({name:"",credential:"",licenseState:"",licenseNumber:"",npi:"",client:"",status:"Onboarding",email:"",phone:"",startDate:"",specialty:""}),af=_af[0],sAF=_af[1];
/* Add Credential form */
var _showAddCred=useState(false),showAddCred=_showAddCred[0],sShowAddCred=_showAddCred[1];
var _cf=useState({providerID:"",type:"",number:"",state:"",issueDate:"",expiryDate:"",status:"Active",notes:""}),cf=_cf[0],sCF=_cf[1];
/* Add Enrollment form */
var _showAddEnroll=useState(false),showAddEnroll=_showAddEnroll[0],sShowAddEnroll=_showAddEnroll[1];
var _ef=useState({providerID:"",payer:"",status:"Not Started",submittedDate:"",approvedDate:"",notes:"",effectiveDate:""}),ef=_ef[0],sEF=_ef[1];

var isAdmin=role==="admin";

var saveSession=function(u,e,r){try{localStorage.setItem("desta_op_session",JSON.stringify({user:u,email:e,role:r}))}catch(x){}};

var load=function(){sL(true);
fetch(U+"?type=operate").then(function(r){return r.json()}).then(function(d){
if(d.providers)sProviders(d.providers);
if(d.credentials)sCreds(d.credentials);
if(d.enrollments)sEnroll(d.enrollments);
if(d.activity)sActivity(d.activity);
if(d.invites)sCfg({invites:d.invites});
sL(false);
}).catch(function(){sL(false)})};

useEffect(function(){if(ph==="app")load()},[ph]);

var trySignIn=function(){
if(!ue.trim()||!pw.trim())return;var em=ue.trim().toLowerCase();
if(ADMINS.indexOf(em)>=0&&pw==="desta"){sRole("admin");sU("Biruh Mezgebu");sPh("app");saveSession("Biruh Mezgebu",em,"admin");return}
sAE("Invalid credentials.");};

/* Filtered providers */
var filtered=providers.filter(function(p){return fc==="all"||p.Client===fc});

/* Alerts */
var alerts=[];
credentials.forEach(function(c){
if(c.ExpiryDate){var d=new Date(c.ExpiryDate);var now=new Date();var days=Math.floor((d-now)/86400000);
if(days<0)alerts.push({type:"expired",msg:c.Type+" expired for "+(providers.find(function(p){return p.ID===c.ProviderID})||{}).Name,days:days,color:C.rd});
else if(days<=30)alerts.push({type:"expiring",msg:c.Type+" expiring in "+days+" days for "+(providers.find(function(p){return p.ID===c.ProviderID})||{}).Name,days:days,color:C.or});
}});
enrollments.forEach(function(e){
if(e.Status==="Pending Info"||e.Status==="Under Review"){
var p=providers.find(function(p2){return p2.ID===e.ProviderID});
if(e.SubmittedDate){var days=Math.floor((new Date()-new Date(e.SubmittedDate))/86400000);
if(days>30)alerts.push({type:"stale",msg:e.Payer+" enrollment stale ("+days+" days) for "+(p||{}).Name,days:days,color:C.or})}}});
alerts.sort(function(a,b){return a.days-b.days});

/* Stats */
var totalProviders=providers.length;
var activeProviders=providers.filter(function(p){return p.Status==="Active"}).length;
var pendingEnrollments=enrollments.filter(function(e){return e.Status!=="Approved"&&e.Status!=="Denied"&&e.Status!=="Not Started"}).length;
var approvedEnrollments=enrollments.filter(function(e){return e.Status==="Approved"}).length;
var expiringCreds=credentials.filter(function(c){if(!c.ExpiryDate)return false;var d=Math.floor((new Date(c.ExpiryDate)-new Date())/86400000);return d>=0&&d<=30}).length;
var expiredCreds=credentials.filter(function(c){if(!c.ExpiryDate)return false;return new Date(c.ExpiryDate)<new Date()}).length;

/* Add provider */
var addProvider=function(){
if(!af.name.trim())return;
var id="P"+Date.now();
post({event:"op_add_provider",id:id,name:af.name,credential:af.credential,licenseState:af.licenseState,licenseNumber:af.licenseNumber,npi:af.npi,client:af.client,status:af.status,email:af.email,phone:af.phone,startDate:af.startDate,specialty:af.specialty,addedBy:user});
sAF({name:"",credential:"",licenseState:"",licenseNumber:"",npi:"",client:"",status:"Onboarding",email:"",phone:"",startDate:"",specialty:""});
sAddP(false);setTimeout(load,1500)};

/* Add credential */
var addCredential=function(){
if(!cf.providerID||!cf.type)return;
post({event:"op_add_credential",providerID:cf.providerID,type:cf.type,number:cf.number,state:cf.state,issueDate:cf.issueDate,expiryDate:cf.expiryDate,status:cf.status,notes:cf.notes,addedBy:user});
sCF({providerID:"",type:"",number:"",state:"",issueDate:"",expiryDate:"",status:"Active",notes:""});
sShowAddCred(false);setTimeout(load,1500)};

/* Add enrollment */
var addEnrollment=function(){
if(!ef.providerID||!ef.payer)return;
post({event:"op_add_enrollment",providerID:ef.providerID,payer:ef.payer,status:ef.status,submittedDate:ef.submittedDate,approvedDate:ef.approvedDate,effectiveDate:ef.effectiveDate,notes:ef.notes,addedBy:user});
sEF({providerID:"",payer:"",status:"Not Started",submittedDate:"",approvedDate:"",notes:"",effectiveDate:""});
sShowAddEnroll(false);setTimeout(load,1500)};

/* Update enrollment status */
var updateEnrollStatus=function(idx,newStatus){
var e=enrollments[idx];if(!e)return;
post({event:"op_update_enrollment",providerID:e.ProviderID,payer:e.Payer,status:newStatus,user:user});
var nw=enrollments.slice();nw[idx]=Object.assign({},e,{Status:newStatus});sEnroll(nw)};

/* ========== AUTH ========== */
if(ph==="auth")return(<div style={{minHeight:"100vh",background:"linear-gradient(135deg,#F8F6F1,#EDE8E0)",display:"flex",alignItems:"center",justifyContent:"center"}}>
<div style={{width:380,background:C.wh,borderRadius:16,padding:36,boxShadow:"0 20px 60px rgba(0,0,0,.08)"}}>
<div style={{textAlign:"center",marginBottom:24}}>
<div style={{display:"flex",alignItems:"baseline",justifyContent:"center",gap:4}}><span style={{fontFamily:"Georgia,serif",letterSpacing:2,fontSize:20,color:C.ch}}>DESTA</span><span style={{fontFamily:"Georgia,serif",letterSpacing:2,fontSize:20,color:C.br}}>WORKS</span></div>
<div style={{fontSize:11,color:C.gy,letterSpacing:2,marginTop:4}}>O P E R A T E</div>
<div style={{fontSize:12,color:C.gy,marginTop:12}}>Provider Management Platform</div>
</div>
<div style={{marginBottom:12}}><div style={{fontSize:11,color:C.gy,marginBottom:4}}>EMAIL</div>
<input className="input" value={ue} onChange={function(e){sUE(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")trySignIn()}} placeholder="your@email.com"/></div>
<div style={{marginBottom:16}}><div style={{fontSize:11,color:C.gy,marginBottom:4}}>PASSWORD</div>
<input className="input" type="password" value={pw} onChange={function(e){sPW(e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")trySignIn()}} placeholder="Enter password"/></div>
{ae&&<div style={{color:C.rd,fontSize:12,marginBottom:10}}>{ae}</div>}
<button className="btn" onClick={trySignIn} style={{width:"100%",padding:13,background:C.br,color:C.iv,fontSize:15,borderRadius:8}}>Sign In</button>
<div style={{textAlign:"center",marginTop:16}}><a href="https://biruhmezgebu1.github.io/desta-platform/" style={{fontSize:11,color:"#aaa",textDecoration:"none",letterSpacing:1}}>← All Platforms</a></div>
<div style={{textAlign:"center",marginTop:12,fontSize:10,color:"#ddd",letterSpacing:1}}>Addis Ababa, Ethiopia</div>
</div></div>);

/* ========== MAIN LAYOUT ========== */
return(<div style={{minHeight:"100vh",background:"#F5F4F0"}}>

{/* HEADER */}
<div className="no-print" style={{background:C.wh,borderBottom:"1px solid rgba(0,0,0,.06)",padding:"8px 24px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"sticky",top:0,zIndex:100,boxShadow:"0 1px 3px rgba(0,0,0,.04)"}}>
<div style={{display:"flex",alignItems:"center",gap:14}}>
<button className="hamburger" onClick={function(){sMob(!mobOpen)}}>&#9776;</button>
<div style={{display:"flex",alignItems:"baseline",gap:2}}><span style={{fontFamily:"Georgia,serif",letterSpacing:2,fontSize:15,color:C.ch}}>DESTA</span><span style={{fontFamily:"Georgia,serif",letterSpacing:2,fontSize:15,color:C.br}}>WORKS</span></div>
<div style={{width:1,height:20,background:"#E0E0E0"}}/><div style={{fontSize:13,fontWeight:700,color:C.br,letterSpacing:1}}>OPERATE</div></div>
<div style={{display:"flex",alignItems:"center",gap:10}}>
<Av name={user} size={30}/>
<div style={{fontSize:12}}><div style={{fontWeight:600}}>{user}</div><div style={{fontSize:10,color:C.br}}>{role==="admin"?"Admin":"User"}</div></div>
<button className="btn" onClick={function(){try{localStorage.removeItem("desta_op_session");localStorage.removeItem("desta_ats_session")}catch(x){};sPh("auth");sRole(null);sU("");sUE("")}} style={{background:"#f5f5f5",color:C.gy,fontSize:11,padding:"5px 12px"}}>Sign Out</button>
</div></div>

<div style={{display:"flex",minHeight:"calc(100vh - 52px)"}}>

{/* SIDEBAR */}
{mobOpen&&<div className="mob-overlay" onClick={function(){sMob(false)}}/>}
<div className={"sidebar no-print"+(mobOpen?" open":"")}>
<div style={{display:"flex",flexDirection:"column",gap:3}}>
{[["dash","Dashboard"],["providers","Providers"],["credentialing","Credentialing"],["compliance","Compliance"],["analytics","Analytics"]].map(function(n){
return <div key={n[0]} className={"ni"+(vw===n[0]?" on":"")} onClick={function(){sV(n[0]);sMob(false)}}>{n[1]}</div>})}
</div>
<div style={{marginTop:20,padding:"0 8px"}}>
<div style={{fontSize:10,color:C.gy,letterSpacing:1,marginBottom:6}}>CLIENT FILTER</div>
<select className="input" value={fc} onChange={function(e){sFC(e.target.value)}} style={{fontSize:12}}><option value="all">All Clients</option>{CLIENTS.map(function(c){return <option key={c} value={c}>{c}</option>})}</select></div>
<div style={{marginTop:12,padding:"0 8px",display:"flex",flexDirection:"column",gap:6}}>
<button className="btn" onClick={function(){sAddP(true)}} style={{background:C.br,color:C.iv,width:"100%",padding:10,fontSize:13}}>+ Add Provider</button>
<button className="btn" onClick={function(){sShowAddCred(true)}} style={{background:C.tl,color:C.wh,width:"100%",padding:10,fontSize:12}}>+ Credential</button>
<button className="btn" onClick={function(){sShowAddEnroll(true)}} style={{background:C.bl,color:C.wh,width:"100%",padding:10,fontSize:12}}>+ Enrollment</button>
</div>
<div style={{marginTop:10,padding:"0 8px",display:"flex",gap:6}}>
{ld&&<div style={{width:12,height:12,border:"2px solid #E0E0E0",borderTopColor:C.br,borderRadius:"50%",animation:"spin 1s linear infinite"}}/>}
<button className="btn" onClick={load} style={{background:"#f5f5f5",color:C.gy,width:"100%",fontSize:11}}>Refresh</button></div>
</div>

{/* MAIN CONTENT */}
<div style={{flex:1,padding:24,overflowX:"auto"}}>

{/* ===== DASHBOARD ===== */}
{vw==="dash"&&<div style={{animation:"fadeUp .3s ease"}}>
<div style={{marginBottom:20}}><div style={{fontSize:20,fontWeight:700}}>Dashboard</div>
<div style={{fontSize:13,color:C.gy}}>Provider operations overview</div></div>

{/* Stat cards */}
<div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:10,marginBottom:16}}>
{[{n:totalProviders,l:"Total Providers",c:C.br,bg:"#FDFBF7"},{n:activeProviders,l:"Active",c:C.gn,bg:"#E8F5E9"},{n:pendingEnrollments,l:"Pending Enrollments",c:C.bl,bg:"#EBF0F8"},{n:approvedEnrollments,l:"Approved",c:C.tl,bg:"#E0F2F1"},{n:expiringCreds,l:"Expiring Soon",c:C.or,bg:"#FFF3E0"},{n:expiredCreds,l:"Expired",c:C.rd,bg:"#FFEBEE"}].map(function(s){
return <div key={s.l} style={{textAlign:"center",padding:14,background:s.bg,borderRadius:10}}>
<div style={{fontSize:28,fontWeight:700,fontFamily:"Georgia,serif",color:s.c}}>{s.n}</div>
<div style={{fontSize:9,color:C.gy,letterSpacing:.5,textTransform:"uppercase",marginTop:2}}>{s.l}</div></div>})}
</div>

{/* Alerts */}
{alerts.length>0&&<div className="section">
<div style={{fontSize:14,fontWeight:700,marginBottom:10}}>&#9888; Alerts ({alerts.length})</div>
{alerts.slice(0,8).map(function(a,i){return <div key={i} className="alert-card" style={{background:a.type==="expired"?"#FFEBEE":"#FFF3E0",borderLeft:"3px solid "+a.color}}>
<span style={{color:a.color,fontWeight:700}}>{a.type==="expired"?"EXPIRED":"ATTENTION"}</span>
<span>{a.msg}</span></div>})}
</div>}

{/* Recent providers */}
<div className="section">
<div style={{fontSize:14,fontWeight:700,marginBottom:10}}>Providers</div>
{providers.length===0&&<div style={{color:C.gy,textAlign:"center",padding:20}}>No providers yet. Add a provider from the sidebar or import from the ATS.</div>}
{filtered.slice(0,10).map(function(p){
var pCreds=credentials.filter(function(c){return c.ProviderID===p.ID});
var pEnroll=enrollments.filter(function(e){return e.ProviderID===p.ID});
var approved=pEnroll.filter(function(e){return e.Status==="Approved"}).length;
var total=pEnroll.length;
var expiring=pCreds.filter(function(c){if(!c.ExpiryDate)return false;var d=Math.floor((new Date(c.ExpiryDate)-new Date())/86400000);return d>=0&&d<=30}).length;
var expired=pCreds.filter(function(c){if(!c.ExpiryDate)return false;return new Date(c.ExpiryDate)<new Date()}).length;

return <div key={p.ID} className="user-row" style={{cursor:"pointer"}} onClick={function(){sSel(p.ID);sV("providers")}}>
<Av name={p.Name} size={40}/>
<div style={{flex:1}}>
<div style={{fontWeight:600}}>{p.Name}</div>
<div style={{fontSize:12,color:C.gy}}>{p.Credential} · {p.LicenseState} · {p.Client}</div>
</div>
<div style={{display:"flex",gap:6,alignItems:"center"}}>
{expired>0&&<span className="badge" style={{background:"#FFEBEE",color:C.rd}}>{expired} expired</span>}
{expiring>0&&<span className="badge" style={{background:"#FFF3E0",color:C.or}}>{expiring} expiring</span>}
{total>0&&<span className="badge" style={{background:C.lbl,color:C.bl}}>{approved}/{total} payers</span>}
<span className="badge" style={{background:p.Status==="Active"?"#E8F5E9":p.Status==="Onboarding"?"#FFF3E0":"#f5f5f5",color:p.Status==="Active"?C.gn:p.Status==="Onboarding"?C.or:C.gy}}>{p.Status}</span>
</div></div>})}
</div>
</div>}

{/* ===== PROVIDERS LIST ===== */}
{vw==="providers"&&<div style={{animation:"fadeUp .3s ease"}}>
<div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

{credentials.length===0&&<div style={{textAlign:"center",padding:30,color:C.gy}}>No credentials tracked. Click "+ Credential" to start tracking licenses, DEA, certifications.</div>}

{active>0&&<div style={{height:20,background:C.gn,borderRadius:4,flex:active,display:"flex",alignItems:"center",justifyContent:"center",color:C.wh,fontSize:9,fontWeight:700}}>{active}</div>}
{expiring>0&&<div style={{height:20,background:C.or,borderRadius:4,flex:expiring,display:"flex",alignItems:"center",justifyContent:"center",color:C.wh,fontSize:9,fontWeight:700}}>{expiring}</div>}
{exp>0&&<div style={{height:20,background:C.rd,borderRadius:4,flex:exp,display:"flex",alignItems:"center",justifyContent:"center",color:C.wh,fontSize:9,fontWeight:700}}>{exp}</div>}

<div style={{minWidth:30,fontSize:12,fontWeight:600}}>{tc.length}</div>

</div>

{PROVIDER_STATUSES.map(function(s){var cnt=providers.filter(function(p){return p.Status===s}).length;if(cnt===0)return null;

</div>}

<div style={{display:"flex",gap:6,marginTop:4}}>
<span className="badge" style={{background:p.Status==="Active"?"#E8F5E9":"#FFF3E0",color:p.Status==="Active"?C.gn:C.or}}>{p.Status}</span>
{p.NPI&&<span className="badge" style={{background:"#f5f5f5",color:C.gy}}>NPI: {p.NPI}</span>}
</div></div>
</div>

{[["Email",p.Email],["Phone",p.Phone],["Start Date",p.StartDate],["License #",p.LicenseNumber],["Specialty",p.Specialty],["Added By",p.AddedBy]].map(function(r){
return <div key={r[0]}><div style={{fontSize:10,color:C.gy}}>{r[0]}</div><div style={{fontSize:13,fontWeight:600}}>{r[1]||"—"}</div></div>})}
</div>

{/* Credentials */}
<div style={{fontSize:14,fontWeight:700,marginBottom:8}}>Credentials ({pCreds.length})</div>
{pCreds.length===0&&<div style={{color:C.gy,fontSize:12,marginBottom:12}}>No credentials tracked for this provider.</div>}
{pCreds.map(function(c,i){var days=c.ExpiryDate?Math.floor((new Date(c.ExpiryDate)-new Date())/86400000):null;
return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f5f5f5",fontSize:12}}>
<div><span style={{fontWeight:600}}>{c.Type}</span>{c.Number&&<span style={{color:C.gy}}> · #{c.Number}</span>}{c.State&&<span style={{color:C.gy}}> · {c.State}</span>}</div>
<div>{days!==null?<span style={{fontWeight:700,color:days<0?C.rd:days<=30?C.or:C.gn}}>{days<0?"Expired":"Expires in "+days+"d"}</span>:<span style={{color:C.gy}}>No expiry</span>}</div>
</div>})}

{/* Enrollments */}
<div style={{fontSize:14,fontWeight:700,marginBottom:8,marginTop:16}}>Payer Enrollments ({pEnroll.length})</div>
<div className="progress-bar" style={{marginBottom:8}}><div className="progress-fill" style={{width:(pEnroll.length>0?Math.round(approved/pEnroll.length*100):0)+"%",background:C.gn}}/></div>

{pEnroll.map(function(e,i){return <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #f5f5f5",fontSize:12}}>

<span className="badge" style={{background:PSC[e.Status]+"20",color:PSC[e.Status]}}>{e.Status}</span>
</div>})}
</div></div>})()}

{/* ===== ADD PROVIDER MODAL ===== */}
{showAddP&&<div className="modal-overlay" onClick={function(){sAddP(false)}}>

<div><div style={{fontSize:11,color:C.gy,marginBottom:3}}>EMAIL</div><input className="input" value={af.email} onChange={function(e){sAF(Object.assign({},af,{email:e.target.value}))}}/></div>
